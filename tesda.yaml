openapi: 3.0.3
info:
  title: DAP BFF API
  version: ${project.version}
servers:
  - url: /
tags:
  - name: Alive
  - name: Status
  - name: Info
  - name: ApplicationProcess
  - name: MasterData
  - name: Images
  - name: Companies
  - name: Addresses
  - name: Testing

paths:
  /.well-known/swisscard/alive:
    $ref: '../borkum-status-api/status-openapi.yaml#/paths/~1alive'
  /.well-known/swisscard/status:
    $ref: '../borkum-status-api/status-openapi.yaml#/paths/~1status'
  /api/bff/public/info/application:
    get:
      tags:
        - Info
      summary: Get application info
      description: |
        Endpoint to retrieve application info (such as versions).
      operationId: getApplicationInfo
      parameters:
        - $ref: 'headers.yaml#/sc-webapp-version'
      responses:
        '200':
          description: The application info.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationInfo'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /api/bff/public/info/user:
    get:
      tags:
        - Info
      summary: Get user info
      description: |
        Endpoint to retrieve user info (such as available variants).
      operationId: getUserInfo
      parameters:
        - $ref: 'headers.yaml#/sc-webapp-version'
      responses:
        '200':
          description: The user info.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInfo'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /api/bff/public/products:
    get:
      tags:
        - MasterData
      description: |
        Lists all available products and relevant information.
      operationId: getProducts
      parameters:
        - $ref: 'headers.yaml#/sc-webapp-version'
        - $ref: 'headers.yaml#/Accept-Language'
      responses:
        '200':
          description: The available products types
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductsMasterDataList'
        default:
          $ref: '#/components/responses/ErrorResponse'
      summary: Lists all available products and relevant information.
  /api/bff/public/products/{productCode}/image:
    get:
      tags:
        - Images
      description: |
        Get Product Image
      operationId: getProductImage
      parameters:
        - $ref: 'headers.yaml#/sc-webapp-version'
        - name: productCode
          in: path
          description: The product ID
          required: true
          schema:
            type: string
        - name: processing
          in: query
          description: The image processing instructions
          schema:
            $ref: '#/components/schemas/ImageProcessing'
      responses:
        '200':
          description: An image
          content:
            image/*:
              schema:
                type: string
                format: binary
        default:
          $ref: '#/components/responses/ErrorResponse'
      summary: Get Product Image
  /api/bff/public/images/products/{productCode}:
    get:
      tags:
        - Images
      summary: Get Product Image. Deprecated. Please use getProductImage
      operationId: getProductImageDeprecated
      deprecated: true
      parameters:
        - $ref: 'headers.yaml#/sc-webapp-version'
        - name: productCode
          in: path
          description: The product ID
          required: true
          schema:
            type: string
        - name: processing
          in: query
          description: The image processing instructions
          schema:
            $ref: '#/components/schemas/ImageProcessing'
      responses:
        '200':
          description: An image
          content:
            image/*:
              schema:
                type: string
                format: binary
        default:
          $ref: '#/components/responses/ErrorResponse'
  /api/bff/public/employment-types:
    get:
      tags:
        - MasterData
      description: |
        Lists all available employment types and relevant information.
        This endpoint also returns the i18n for these employment types.
      operationId: getEmploymentTypes
      parameters:
        - $ref: 'headers.yaml#/sc-webapp-version'
        - $ref: 'headers.yaml#/Accept-Language'
      responses:
        '200':
          description: All available employment types
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmploymentTypeMasterDataList'
        default:
          $ref: '#/components/responses/ErrorResponse'
      summary: Returns all available employment types for DAP.
  /api/bff/public/occupation-types:
    get:
      tags:
        - MasterData
      description: |
        Lists all available occupation types and relevant information.
        This endpoint also returns the i18n of the occupation types.
        Every occupation type belongs to a specific employment-type
      operationId: getOccupationTypes
      parameters:
        - $ref: 'headers.yaml#/sc-webapp-version'
        - $ref: 'headers.yaml#/Accept-Language'
      responses:
        '200':
          description: The available occupation types
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OccupationTypeMasterDataList'
        default:
          $ref: '#/components/responses/ErrorResponse'
      summary: Returns the available occupation types for DAP.
  /api/bff/public/frontend-problems:
    post:
      tags:
        - Problem
      description: |-
        Endpoint can be used to report problems that occur on the end users device
      operationId: reportFrontendProblem
      parameters:
        - $ref: 'headers.yaml#/sc-webapp-version'
        - $ref: 'headers.yaml#/sc-application-process-id'
      requestBody:
        description: Data describing the problem
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportFrontendProblemRequest'
      responses:
        204:
          description: Problem successfully accepted
        default:
          $ref: '#/components/responses/ErrorResponse'
  /api/bff/public/application-processes/{applicationProcessId}:
    get:
      description: Returns the application process
      operationId: getApplicationProcess
      parameters:
        - name: applicationProcessId
          description: Identifies an application process
          in: path
          required: true
          schema:
            type: string
        - $ref: 'headers.yaml#/sc-webapp-version'
        - $ref: 'headers.yaml#/sc-application-process-id'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationResponse'
          description: Successful
        default:
          $ref: '#/components/responses/ErrorResponse'
      tags:
        - ApplicationProcess
  /api/bff/protected/companies:
    get:
      tags:
        - Companies
      summary: Search for companies
      operationId: getCompanies
      security:
        - swisscardAuthorization: [ ]
      parameters:
        - $ref: 'headers.yaml#/sc-webapp-version'
        - name: search
          in: query
          description: Query to search for companies
          required: true
          example: swisscard
          schema:
            type: string
      responses:
        '200':
          description: The matching companies from Zefix.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ZefixCompanies'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /api/bff/protected/addresses:
    post:
      description: Autocomplete address for user entered queries.
      operationId: autocompleteAddress
      tags:
        - Addresses
      security:
        - swisscardAuthorization: [ ]
      parameters:
        - $ref: 'headers.yaml#/sc-webapp-version'
        - $ref: 'headers.yaml#/sc-application-process-id'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AutocompletionAddress'
        required: true
      responses:
        "200":
          description: Successful autocomplete response.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AutocompletionAddress'
  /api/bff/protected/application-processes:
    post:
      description: Start the applicatin process
      operationId: startApplication
      security:
        - swisscardAuthorization: [ ]
      parameters:
        - $ref: 'headers.yaml#/sc-webapp-version'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartApplicationRequest'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationResponse'
          description: Successful
        default:
          $ref: '#/components/responses/ErrorResponse'
      tags:
        - ApplicationProcess
    get:
      description: Returns the application process including the current task
      operationId: getApplication
      security:
        - swisscardAuthorization: [ ]
      parameters:
        - $ref: 'headers.yaml#/sc-webapp-version'
        - $ref: 'headers.yaml#/sc-application-process-id'
      responses:
        "200":
          content:
            application/json:
