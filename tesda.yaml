      type: object
    ReportFrontendProblemRequest:
      description: |
        Describes an problem that occurred on an end users device.
        The cause of the problem might be a previously executed call against dap or an other system.
      type: object
      required:
        - instance
        - level
        - timestamp
        - message
        - userFriendlyProblemId
      properties:
        applicationProcessId:
          description: ID of the application process if available
          type: string
        applicationInsightsUserId:
          description: ID generated by application insights. Identifies the user.
          type: string
          maxLength: 128
        applicationInsightsSessionId:
          description: ID generated by application insights. Identifies the session.
          type: string
          maxLength: 64
        message:
          description: Should explain the problem
          type: string
        detail:
          description: Detail of the problem if available
          type: object
        errorPage:
          description: The name of the error page that was shown to the customer.
          type: string
          maxLength: 255
        instance:
          description: The url, functionality or object that caused the problem.
          type: string
          maxLength: 255
        level:
          description: The severity of the incident
          type: string
          enum:
            - WARN
            - ERROR
        userFriendlyProblemId:
          description: Human readable problem id that is shown to the customer.
          maxLength: 16
          type: string
        problemCode:
          description: Problem Code if available
          type: string
          maxLength: 64
        problemId:
          description: Uniquely identifies the problem together with the instance.
          type: string
          maxLength: 64
        statusCode:
          description: The HTTP status code ([RFC7231], Section 6) if the problem
            was caused by a http call.
          type: integer
          example: 500
        timestamp:
          description: |
            When did the incident occur?
            If available, return timestamp provided by downstream system.
            Use now() only if no such timestamp exists.
          type: string
          format: date-time
        requestId:
          description: Unique identification of the request causing the problem (typically
            a UUID).
          type: string
          example: c1a8c93c-3046-41fb-918f-ba075fcb97e0
          maxLength: 36
        processId:
          description: Unique identification of the process causing the problem  (typically
            a UUID).
          type: string
          example: c1a8c93c-3046-41fb-918f-ba075fcb97e0
          maxLength: 36
    IdentificationDocumentType:
      description: Type of the document for identifying the applicant.
      type: string
      enum:
        - ID_CARD
        - PASSPORT
        - RESIDENCE_PERMIT
    IdentificationStatus:
      description: Status received from the identification service
      type: string
      enum:
        - START
        - REVIEW_PENDING
        - CHECK_PENDING
        - FRAUD_SUSPICION_PENDING
        - SUCCESS
        - SUCCESS_DATA_CHANGED
        - ABORTED
        - CANCELED
        - FRAUD_SUSPICION_CONFIRMED
    FlowControl:
      type: object
      properties:
        idNowFlow:
          description: Set this value to choose between IDnow over IAM or DAP
          type: string
          enum:
            - IAM
            - DAP
        idNowTesting:
          description: Set this value to go through the IDnow testing route in DAP
          type: boolean
        skipValidation:
          $ref: '#/components/schemas/CheckResultType'
    CheckResultType:
      description: Desired validation output
      type: string
      enum:
        - AUTOMATIC
        - DENY
        - MANUAL

  responses:
    ErrorResponse:
      description: Problem Response
      content:
        application/problem+json:
          schema:
            $ref: '../borkum-common/problem-schema.yaml#/Problem'
    TaskResponse:
      description: Successful
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/TaskResponse'
  securitySchemes:
    swisscardAuthorization:
      type: apiKey
      in: header
      name: sc-access-authorization
