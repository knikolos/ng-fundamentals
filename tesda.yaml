      tags:
        - Testing
      security:
        - swisscardAuthorization: [ ]
      parameters:
        - $ref: 'headers.yaml#/sc-webapp-version'
        - $ref: 'headers.yaml#/sc-application-process-id'
      requestBody:
        description: Update flow control
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FlowControl'
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlowControl'
        default:
          $ref: '#/components/responses/ErrorResponse'
components:
  schemas:
    ZefixCompanies:
      type: array
      items:
        $ref: '#/components/schemas/ZefixCompany'
    ZefixCompany:
      type: object
      description: Company information retrieved from Swiss Zefix (Zentraler Firmenindex).
      required:
        - company
        - ehraid
      properties:
        ehraid:
          type: string
          description: Unique identifier for this company and address
        company:
          $ref: '#/components/schemas/Company'
    Company:
      type: object
      required:
        - name
        - address
      properties:
        name:
          type: string
          description: The company name
          example: Swisscard AECS GmbH
        address:
          $ref: '#/components/schemas/Address'
    ImageProcessing:
      type: object
      description: |
        Instructions for image processing. An image may be scaled by
        specifying height and/or width.
        Note: Aspect ratio is maintained when specifying either height
        or width but not when specifying both.
      properties:
        height:
          type: integer
          minimum: 1
          maximum: 2160
          description: The desired height of the image (in px).
        width:
          type: integer
          minimum: 1
          maximum: 3840
          description: The desired width of the image (in px).
    UserInfo:
      type: object
      description: User info
      properties:
        availableVariants:
          type: array
          description: |
            The variants available to the user.
            Note: The first variant in the list is the default variant.
          items:
            $ref: '#/components/schemas/Variant'
      required:
        - variants
    Variant:
      type: string
      enum:
        - WIP
        - PREVIEW
        - GA
    SigningUrl:
      type: object
      properties:
        signingUrl:
          type: string
          description: The url to be used for signing
      required:
        - signingUrl
    ApplicationInfo:
      type: object
      description: Application info
      properties:
        bffVersion:
          type: string
          description: Installed version of the Backend for Frontend (bff).
        apiVersion:
          type: string
          description: API version used by the Backend
      required:
        - bffVersion
        - apiVersion

    StartApplicationRequest:
      type: object
      properties:
        deviceId:
          type: string
          maxLength: 64
        loyaltyNumber:
          $ref: '#/components/schemas/LoyaltyNumber'
        productCode:
          $ref: '#/components/schemas/ProductCode'
        promoCode:
          $ref: '#/components/schemas/PromoCode'
        trackingId:
          type: string
          maxLength: 64
        origin:
          type: string
          maxLength: 32
        flowControl:
          $ref: '#/components/schemas/FlowControl'
    ApplicationResponse:
      allOf:
        - $ref: '#/components/schemas/Application'
      description: Response object for returning the header for an application
      type: object
    Application:
      description: Header object for an application
      properties:
        applicationProcessId:
          description: Identifies an application process
          type: string
        startedWithIamCis:
          type: boolean
          # may be deprecated in the future - use `iamLoginCisBinded`
        iamLoginExists:
          type: boolean
        iamLoginCisBound:
          type: boolean
        status:
          $ref: '#/components/schemas/ApplicationStatus'
        statusReason:
          $ref: '#/components/schemas/ApplicationStatusReason'
        statusProgress:
          description: Progress of the status in percent. Will only be delivered for applications in status `PROCESSING`, `PROCESSING_APPROVED`, `PROCESSING_APPROVED_DELAYED`, `PROCESSING_DELAYED`
          type: integer
          format: int32
          minimum: 0
          maximum: 100
        userTask:
          $ref: '#/components/schemas/UserTask'
      required:
        - applicationProcessId
        - startedWithIamCis
        - status
      type: object
    ApplicationStatus:
      description: The Status of the application process
      enum:
        - COLLECTING_DATA
        - PROCESSING
        - PROCESSING_APPROVED
        - PROCESSING_APPROVED_DELAYED
        - PROCESSING_DELAYED
        - ONBOARDING_COMPLETED
        - APPLICATION_DECLINED
        - APPLICATION_CANCELED
        - APPLICATION_ANNULLED
        - PROCESS_CANCELED
      type: string
    ApplicationStatusReason:
      description: |-
        The Status of the application process:
    
        | Reason                      | Short description |
        |-----------------------------|-------------------|
        | IDENTIFICATION_FAILED       | The identification of the applicant failed. | 
        | APPLICANT_IS_UNDERAGE       | The applicant has been detected to be underage. |
        | POTENTIAL_IDENTITY_CHANGE   | A potential undesired identity change has been detected. This can happen if e.g. a friend/partner has access to the phone with an existing Swisscard login and orders a new product. |

      type: string
      enum:
        - IDENTIFICATION_FAILED
        - APPLICANT_IS_UNDERAGE
        - POTENTIAL_IDENTITY_CHANGE
    UserTask:
      description: Response object for returning the header for an application
      properties:
        taskKey:
          $ref: '#/components/schemas/TaskKey'
        taskData:
          $ref: '#/components/schemas/TaskData'
        TaskStatus:
          $ref: '#/components/schemas/TaskStatus'
      required:
        - TaskStatus
      type: object
    TaskKey:
      description: Identifies a task
      enum:
        - IAM_FLOW
        - IDENTIFICATION_CONFIRM_EXISTING_DATA
        - IDENTIFICATION_CITIZENSHIP
        - IDENTIFICATION
        - IDENTIFICATION_TESTING
        - IDENTIFICATION_IN_REVIEW
        - UPDATE_PERSON_DATA
        - UPDATE_CORRESPONDENCE_LANGUAGE
        - UPDATE_LIVING_SITUATION
        - UPDATE_EMPLOYMENT_SITUATION
        - UPDATE_EMPLOYER_DATA
        - UPDATE_FINANCIAL_SITUATION
        - UPDATE_BENEFICIAL_OWNER
        - SELECT_PRODUCT
        - UPDATE_LOYALTY_NUMBER
        - ACCEPT_APPLICATION_DATA
        - SIGN_APPLICATION_DOCUMENT
      example: IAM_FLOW
      type: string
    TaskStatus:
      description: Status of the task (user interaction required or waiting required)
      enum:
        - INTERACTION_REQUIRED
        - POLL_AND_WAIT
      type: string
    TaskData:
      discriminator:
        mapping:
          TaskDataNoData: '#/components/schemas/TaskDataNoData'
          TaskDataIdentificationConfirmExistingData: '#/components/schemas/TaskDataIdentificationConfirmExistingData'
          TaskClosingIdentificationConfirmExistingData: '#/components/schemas/TaskClosingIdentificationConfirmExistingData'
          TaskDataIdentificationCitizenship: '#/components/schemas/TaskDataIdentificationCitizenship'
          TaskDataIdentificationData: '#/components/schemas/TaskDataIdentificationData'
          TaskDataIdentificationTestingData: '#/components/schemas/TaskDataIdentificationTestingData'
          TaskDataUpdatePersonData: '#/components/schemas/TaskDataUpdatePersonData'
          TaskDataUpdateCorrespondenceLanguage: '#/components/schemas/TaskDataUpdateCorrespondenceLanguage'
          TaskDataUpdateLivingSituation: '#/components/schemas/TaskDataUpdateLivingSituation'
          TaskDataUpdateEmploymentSituation: '#/components/schemas/TaskDataUpdateEmploymentSituation'
          TaskDataUpdateEmployerData: '#/components/schemas/TaskDataUpdateEmployerData'
          TaskDataUpdateFinancialSituation: '#/components/schemas/TaskDataUpdateFinancialSituation'
          TaskDataUpdateBeneficialOwner: '#/components/schemas/TaskDataUpdateBeneficialOwner'
          TaskDataSelectProduct: '#/components/schemas/TaskDataSelectProduct'
          TaskClosingDataSelectProduct: '#/components/schemas/TaskClosingDataSelectProduct'
          TaskDataUpdateLoyaltyNumber: '#/components/schemas/TaskDataUpdateLoyaltyNumber'
          TaskClosingDataUpdateLoyaltyNumber: '#/components/schemas/TaskClosingDataUpdateLoyaltyNumber'
          TaskDataAcceptApplicationData: '#/components/schemas/TaskDataAcceptApplicationData'
          TaskClosingDataAcceptApplicationData: '#/components/schemas/TaskClosingDataAcceptApplicationData'
          TaskDataSignApplicationDocument: '#/components/schemas/TaskDataSignApplicationDocument'
          TaskClosingDataSignApplicationDocument: '#/components/schemas/TaskClosingDataSignApplicationDocument'
        propertyName: taskDataType
      properties:
        taskDataType:
          description: Discriminator for inheritance
          type: string
        jumpBackAvailable:
          type: boolean
          description: Exposes if the current task can be aborted and the process can jump to a previous step.
          default: false
      type: object
    TaskDataNoData:
      allOf:
        - $ref: '#/components/schemas/TaskData'
        - type: object
      description: Placeholder task data if no data is required
      type: object
    TaskDataIdentificationConfirmExistingData:
      allOf:
        - $ref: '#/components/schemas/TaskData'
        - type: object
          properties:
            firstName:
              example: James
              type: string
            lastName:
              example: Bond
              type: string
            nationality:
              description: ISO 3166-1 alpha-2 country code.
              example: CH
              pattern: ^[A-Z]{2}$
              type: string
            dateOfBirth:
              type: string
              format: date
              example: '1990-12-31'
            gender:
              $ref: '#/components/schemas/Gender'
            permitType:
              description: Type of the residence permit (only relevant for type RESIDENCE_PERMIT)
              type: string
            permitSince:
              description: Indication since when a permit is granted (only relevant for type RESIDENCE_PERMIT).
              type: string
              format: date
              example: '2023-12-31'
      description: Task data for task IDENTIFICATION_CONFIRM_EXISTING_DATA
      type: object
    TaskClosingIdentificationConfirmExistingData:
      allOf:
        - $ref: '#/components/schemas/TaskData'
        - $ref: '#/components/schemas/TaskClosingIdentificationConfirmExistingData_allOf'
      description: Task closing data for task IDENTIFICATION_CONFIRM_EXISTING_DATA.
      type: object
    TaskDataIdentificationCitizenship:
      allOf:
        - $ref: '#/components/schemas/TaskData'
        - $ref: '#/components/schemas/TaskDataIdentificationCitizenship_allOf'
      description: Task closing data for task IDENTIFICATION_CITIZENSHIP.
      type: object
    TaskDataIdentificationData:
      allOf:
        - $ref: '#/components/schemas/TaskData'
        - type: object
          required:
            - idNowCompanyId
            - idNowIdentId
            - idNowTransactionNumber
            - idNowUrl
          properties:
            idNowCompanyId:
              description: The identifier in IDnow to which company the identId belongs to
              type: string
              example: swisscardautoswissflowchtest
              minLength: 1
              maxLength: 64
            idNowIdentId:
              description: The identifier required to retrieve additional information from IDnow.
              type: string
              example: 'ABC-DEFGH'
              minLength: 1
              maxLength: 16
            idNowTransactionNumber:
              description: The transaction identifier generated by IAM. Can also be used to retrieve additional information from IDnow.
              type: string
              minLength: 1
              maxLength: 48
            idNowUrl:
              type: string
      description: Task data for task IDENTIFICATION.
      type: object
    TaskDataIdentificationTestingData:
      allOf:
        - $ref: '#/components/schemas/TaskData'
        - $ref: '#/components/schemas/TaskDataIdentificationTestingData_allOf'
      description: Task data for task IDENTIFICATION_TESTING
      type: object
    TaskDataUpdatePersonData:
      allOf:
        - $ref: '#/components/schemas/TaskData'
        - $ref: '#/components/schemas/TaskDataUpdatePersonData_allOf'
      description: Task data for task UPDATE_PERSON_DATA
      type: object
    TaskDataUpdateCorrespondenceLanguage:
      allOf:
        - $ref: '#/components/schemas/TaskData'
        - $ref: '#/components/schemas/TaskDataUpdateCorrespondenceLanguage_allOf'
      description: Task data for task UPDATE_CORRESPONDENCE_LANGUAGE
      type: object
    Language:
      description: Supported Languages
      enum:
        - de
        - en
        - fr
        - it
      example: de
      type: string
    TaskDataUpdateLivingSituation:
      allOf:
        - $ref: '#/components/schemas/TaskData'
        - $ref: '#/components/schemas/TaskDataUpdateLivingSituation_allOf'
      description: Task data for task UPDATE_LIVING_SITUATION
      type: object
    HousingConditionType:
      description: The living situation of the applicant
      enum:
        - RENTER
        - PROPRIETOR
      example: RENTER
      type: string
    TaskDataUpdateEmploymentSituation:
      allOf:
        - $ref: '#/components/schemas/TaskData'
        - $ref: '#/components/schemas/EmploymentSituation'
      description: Task data for task UPDATE_EMPLOYMENT_SITUATION
      required:
        - employmentType
      type: object
    TaskDataUpdateEmployerData:
      allOf:
        - $ref: '#/components/schemas/TaskData'
        - $ref: '#/components/schemas/TaskDataUpdateEmployerData_allOf'
      description: Task data for task UPDATE_EMPLOYMENT_SITUATION
      required:
        - employedSince
      type: object
    TaskDataUpdateFinancialSituation:
      allOf:
        - $ref: '#/components/schemas/TaskData'
        - $ref: '#/components/schemas/TaskDataUpdateFinancialSituation_allOf'
      description: Task data for task UPDATE_FINANCIAL_SITUATION
      required:
        - annualSalary
      type: object
    TaskDataUpdateBeneficialOwner:
      allOf:
        - $ref: '#/components/schemas/TaskData'
        - $ref: '#/components/schemas/TaskDataUpdateBeneficialOwner_allOf'
      description: Task data for task UPDATE_BENEFICIAL_OWNER
      required:
        - beneficialOwner
      type: object
    TaskDataSelectProduct:
      description: Task data for task SELECT_PRODUCT (data to be shown on screen).
      allOf:
        - $ref: '#/components/schemas/TaskData'
        - $ref: '#/components/schemas/TaskDataSelectProduct_allOf'
      type: object
    TaskClosingDataSelectProduct:
      allOf:
        - $ref: '#/components/schemas/TaskData'
        - $ref: '#/components/schemas/TaskClosingDataSelectProduct_allOf'
      description: Task closing data for task SELECT_PRODUCT (data returned to DAP)
      required:
        - selectedProductCode
      type: object
    TaskDataUpdateLoyaltyNumber:
      description: Task data for task UPDATE_LOYALTY_NUMBER (data to be shown on screen)
      allOf:
        - $ref: '#/components/schemas/TaskData'
        - $ref: '#/components/schemas/TaskDataUpdateLoyaltyNumber_allOf'
    TaskClosingDataUpdateLoyaltyNumber:
      type: object
      description: Task data for task UPDATE_LOYALTY_NUMBER (data  returned to DAP)
      allOf:
        - $ref: '#/components/schemas/TaskData'
        - $ref: '#/components/schemas/TaskClosingDataUpdateLoyaltyNumber_allOf'
    PromoCode:
      type: string
      description: Represents a PromoCode or MemberGetMemberCode
      maxLength: 16
      minLength: 4
    TaskClosingDataAcceptApplicationData:
      allOf:
        - $ref: '#/components/schemas/TaskData'
        - $ref: '#/components/schemas/TaskClosingDataAcceptApplicationData_allOf'
    TaskDataAcceptApplicationData:
      allOf:
        - $ref: '#/components/schemas/TaskData'
        - $ref: '#/components/schemas/TaskDataAcceptApplicationData_allOf'
      description: Task data for task ACCEPT_APPLICATION_DATA
      required:
        - address
        - applicant
        - civilStatus
        - productCode
        - beneficialOwner
      type: object
    Person:
      description: Person Data of the applicant.
      properties:
        firstName:
          example: James
          type: string
        lastName:
          example: Bond
          type: string
        dateOfBirth:
          format: date
          type: string
        gender:
          $ref: '#/components/schemas/Gender'
        email:
          description: The email address entered by the applicant
          example: user@test.ch
          format: email
          type: string
        mobileNumber:
          description: The mobile number entered by the applicant
          example: +41791234567
          maxLength: 16
          pattern: ^\+[1-9][0-9]+$
          type: string
        nationality:
          description: ISO 3166-1 alpha-2 country code.
          example: CH
          pattern: ^[A-Z]{2}$
          type: string
      type: object
    Gender:
      enum:
        - MALE
        - FEMALE
      example: FEMALE
      type: string
    CivilStatus:
      enum:
        - MARRIED
        - NOT_MARRIED
      example: MARRIED
      type: string
    AutocompletionAddress:
      description: Address information passed and returned when using autocompletion. None of the parameters are required, but for a meaningful response, some should be provided.
      properties:
        houseNumber:
          description: The house number.
          example: "18"
          type: string
        street:
          description: The name of the street.
          example: Neugasse
          type: string
        city:
          description: The name of the city.
          example: Horgen
          type: string
        zipCode:
          description: The ZIP Code.
          example: "8810"
          type: string
    Address:
      description: Address block information.
      properties:
        houseNumber:
          description: The house number.
          example: "18"
          maxLength: 10
          type: string
        street:
          description: The name of the street.
          example: Neugasse
          maxLength: 40
          type: string
        city:
          description: The name of the city.
          example: Horgen
          maxLength: 50
          minLength: 1
          type: string
        zipCode:
          description: The ZIP Code.
          example: "8810"
          maxLength: 10
          minLength: 4
          type: string
      required:
        - city
        - street
        - zipCode
      type: object
    BeneficialOwner:
      description: Information about the beneficial owner
      enum:
        - APPLICANT
        - THIRD_PARTY
      example: APPLICANT
      type: string
    ProductCode:
      description: Identifies a product. Product is based on the two character TPC (TSYS Product Code) and the following CPC (Customer Product Code)
      type: string
      minLength: 5
      maxLength: 5
      example: UACBC
    LoyaltyNumber:
      description: Represents an external loyalty or member number, like for Poinz, Miles&More, ...
      type: string
      maxLength: 32
    EmploymentSituation:
      properties:
        employmentType:
          description: |
            The type of employment of the applicant (see masterdata: /employment-types)
          example: EMPLOYED
          maxLength: 32
          minLength: 1
          type: string
        occupationType:
          description: |
            The type of occupation of the applicant (see masterdata: /occupation-types)
          example: TOP_MANAGEMENT
          maxLength: 32
          minLength: 1
          type: string
      type: object
    FinancialSituation:
      properties:
        annualGrossIncomeInChf:
          format: int32
          minimum: 0
          type: integer
        taxableAssetsInChf:
          format: int32
          minimum: 0
          type: integer
      type: object
    TaskDataSignApplicationDocument:
      allOf:
        - $ref: '#/components/schemas/TaskData'
        - $ref: '#/components/schemas/TaskDataSignApplicationDocument_allOf'
      description: Task data for task SIGN_APPLICATION_DOCUMENT
      type: object
    TaskClosingDataSignApplicationDocument:
      allOf:
        - $ref: '#/components/schemas/TaskData'
        - $ref: '#/components/schemas/TaskClosingDataSignApplicationDocument_allOf'
      description: Task data for closing task SIGN_APPLICATION_DOCUMENT
      type: object
    TaskResponse:
      allOf:
        - $ref: '#/components/schemas/UserTask'
      description: Response object for returning the user task the process is currently
        waiting on
      type: object
    IdentificationConfirmExistingDataRequest:
      description: Request object for confirming existing data
      properties:
        data:
          $ref: '#/components/schemas/TaskClosingIdentificationConfirmExistingData'
      required:
        - data
      type: object
    IdentificationCitizenshipRequest:
      description: Response object for defining the citizenship
      properties:
        data:
          $ref: '#/components/schemas/TaskDataIdentificationCitizenship'
    IdentificationTestingRequest:
      description: Response object for identification testing route
      properties:
        data:
          $ref: '#/components/schemas/TaskDataIdentificationTestingData'
    UpdatePersonDataRequest:
      description: Request object for updating the person data
      properties:
        data:
          $ref: '#/components/schemas/TaskDataUpdatePersonData'
      required:
        - data
      type: object
    UpdateCorrespondenceLanguageRequest:
      description: Request object for updating the correspondence language
      properties:
        data:
          $ref: '#/components/schemas/TaskDataUpdateCorrespondenceLanguage'
      required:
        - data
      type: object
    UpdateLivingSituationRequest:
      description: Request object for updating the living situation
      properties:
        data:
          $ref: '#/components/schemas/TaskDataUpdateLivingSituation'
      required:
        - data
      type: object
    UpdateEmploymentSituationRequest:
      description: Request object for updating the employment situation
      properties:
        data:
          $ref: '#/components/schemas/TaskDataUpdateEmploymentSituation'
      required:
        - data
      type: object
    UpdateEmployerDataRequest:
      description: Request object for updating employer data
      properties:
        data:
          $ref: '#/components/schemas/TaskDataUpdateEmployerData'
      required:
        - data
      type: object
    UpdateFinancialSituationRequest:
      description: Request object for updating the financial situation
      properties:
        data:
          $ref: '#/components/schemas/TaskDataUpdateFinancialSituation'
      required:
        - data
      type: object
    UpdateBeneficialOwnerRequest:
      description: Request object for updating the beneficial owner
      properties:
        data:
          $ref: '#/components/schemas/TaskDataUpdateBeneficialOwner'
      required:
        - data
      type: object
    SelectProductRequest:
      description: Request object for selecting the product
      properties:
        data:
          $ref: '#/components/schemas/TaskClosingDataSelectProduct'
      required:
        - data
      type: object
    UpdateLoyaltyNumberRequest:
      description: Request object for updating loyalty number
      properties:
        data:
          $ref: '#/components/schemas/TaskClosingDataUpdateLoyaltyNumber'
      required:
        - data
      type: object
    ValidatePromoCodeRequest:
      description: Request object for validating a promo code
      properties:
        promoCode:
          $ref: '#/components/schemas/PromoCode'
      required:
        - promoCode
      type: object
    ValidatePromoCodeResponse:
      description: Response object that holds the result of the validation of a promo
        code.
      properties:
        validationResult:
          description: |
            The result of the validation of a promo code.
            The other attributes are only filled if the validation result is VALID.
          enum:
            - VALID
            - INVALID
            - EXPIRED
          type: string
        promoCodeDescription:
          description: |
            The human readable description of a promo code.
            Translated to the language passed in the request.
          type: string
      required:
        - validationResult
      type: object
    AcceptApplicationDataRequest:
      description: Request object for accepting the application data
      properties:
        data:
          $ref: '#/components/schemas/TaskClosingDataAcceptApplicationData'
      required:
        - data
      type: object
    SignApplicationDocumentRequest:
      description: Request object for closing the sign application document task.
      properties:
        data:
          $ref: '#/components/schemas/TaskClosingDataSignApplicationDocument'
      required:
        - data
      type: object
    NotifyIdentificationFailedRequest:
      description: Data required to notify that the identification failed (without cancelling it).
      type: object
      properties:
        reason:
          type: string
        idNowIdentId:
          description: The identifier required to retrieve additional information from IDnow.
          type: string
          example: 'ABC-DEFGH'
          minLength: 1
          maxLength: 16
        idNowTransactionNumber:
          description: The transaction identifier generated by IAM. Can also be used to retrieve additional information from IDnow.
          type: string
          minLength: 1
          maxLength: 48
    NotifyApplicationDocumentAcceptedRequest:
      description: Data required to notify that the application document was accepted.
      type: object
      required:
        - documentApproved
        - documentApprovedTimestamp
      properties:
        documentApproved:
          type: boolean
          description: true if the application document was approved
        documentApprovedTimestamp:
          type: string
          format: date-time
          description: System time of the approval
    NotifyApplicationDocumentAcceptedResponse:
      description: Data containing the url to be used for signing the application document
      type: object
      required:
        - signingUrl
      properties:
        signingUrl:
          type: string
          description: The url to be used for signing
    NotifyDeviceAndAppInformationRequest:
      description: Information about the Device and Application used by the applicant
      type: object
      properties:
        appLanguage:
          type: string
          description: Language configured in the app. Known (correspondence Languages) are de, en, it, fr.
          pattern: "^[a-z]{2}$"
        appVersion:
          type: string
          maxLength: 127
        deviceModel:
          type: string
          maxLength: 127
        deviceVendor:
          type: string
          maxLength: 127
        osType:
          type: string
          maxLength: 127
          example: "Windows"
        osVersion:
          type: string
          maxLength: 127
          example: "10"
        webAppVersion:
          type: string
          maxLength: 127
    NotifySignApplicationDocumentNotSuccessfulRequest:
      description: Data required to to notify that the signing of the application document was not successful
      type: object
      required:
        - reason
      properties:
        signingUrl:
          type: string
          description: certifaction signing url
        reason:
          type: string
          description: reason why the signing of the document was not successful
          maxLength: 50
    TaskClosingIdentificationConfirmExistingData_allOf:
      properties:
        personalDataConfirmed:
          type: boolean
      required:
        - personalDataConfirmed
      type: object
    TaskDataIdentificationCitizenship_allOf:
      properties:
        swissCitizen:
          type: boolean
      required:
        - swissCitizen
      type: object
    TaskDataIdentificationTestingData_allOf:
      properties:
        idNowCompanyId:
          description: The identifier in IDnow to which company the identId belongs to
          type: string
          example: swisscardautoswissflowchtest
          minLength: 1
          maxLength: 64
        idNowIdentId:
          description: The identifier required to retrieve additional information from IDnow.
          type: string
          example: 'ABC-DEFGH'
          minLength: 1
          maxLength: 16
        idNowTransactionNumber:
          description: The transaction identifier generated by IAM. Can also be used to retrieve additional information from IDnow.
          type: string
          minLength: 1
          maxLength: 48
        firstName:
          example: James
          type: string
        lastName:
          example: Bond
          type: string
        nationality:
          description: ISO 3166-1 alpha-2 country code.
          example: CH
          pattern: ^[A-Z]{2}$
          type: string
        dateOfBirth:
          type: string
          format: date
          example: '1990-12-31'
        gender:
          $ref: '#/components/schemas/Gender'
        documentType:
          $ref: '#/components/schemas/IdentificationDocumentType'
        number:
          description: |
            Number of the document for identifying the applicant
            Swiss Passport: Length 8 characters
            Swiss Identity Card: Length 8 characters
            Swiss Residence Permit: Length 9 characters
          type: string
          minLength: 8
          maxLength: 9
          example: 'E1234567'
        permitType:
          description: Type of the residence permit (only relevant for type RESIDENCE_PERMIT)
          type: string
        permitSince:
          description: Indication since when a permit is granted (only relevant for type RESIDENCE_PERMIT).
          type: string
          format: date
          example: '2023-12-31'
        identificationStatus:
          $ref: '#/components/schemas/IdentificationStatus'
      required:
        - idNowCompanyId
        - idNowIdentId
        - idNowTransactionNumber
        - firstName
        - lastName
        - nationality
        - dateOfBirth
        - gender
        - documentType
        - number
        - identificationStatus
      type: object

